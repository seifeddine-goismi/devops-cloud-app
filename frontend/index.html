<!DOCTYPE html>
<html>
<head>
  <title>Seifeddine Cloud DevOps</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c92d2);
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 120px;
      font-size: 50px;
      animation: fadeIn 3s ease-in-out;
    }

    h2 {
      color: #00ffcc;
      animation: slide 3s ease-in-out;
    }

    .cloud {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 50%;
      margin: 50px auto;
      animation: float 4s infinite ease-in-out;
      box-shadow: 0 0 30px #00ffcc;
    }

    @keyframes gradient {
      0% {background-position:0% 50%}
      50% {background-position:100% 50%}
      100% {background-position:0% 50%}
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    @keyframes slide {
      from {transform: translateY(50px); opacity:0;}
      to {transform: translateY(0); opacity:1;}
    }

    @keyframes float {
      0%,100% {transform: translateY(0);}
      50% {transform: translateY(-40px);}
    }
  </style>
</head>

<body>

  <h1>☁️ Seifeddine Goismi</h1>
  <h2>DevOps • Cloud Engineer • AWS • Azure • GCP</h2>

  <div class="cloud"></div>

</body>
</html>
